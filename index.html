<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunset Heights Parking Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; padding: 0; display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 350px; background: #f8fafc; overflow-y: auto; padding: 20px; border-right: 1px solid #e2e8f0; }
        #map-container { flex-grow: 1; position: relative; }
        #map { height: 100%; }
        .chart-container { height: 200px; margin-bottom: 20px; }
    </style>
</head>
<body>

<div id="sidebar">
    <h1 class="text-xl font-bold mb-4">Sunset Heights Parking Analysis</h1>
    <div id="summary" class="bg-white p-4 rounded shadow mb-4">
        <p class="text-sm">Off-Street Parking Prevalence</p>
        <div id="parking-rate" class="text-3xl font-bold text-blue-600">0%</div>
    </div>
    
    <div class="space-y-4">
        <input type="text" id="filter-address" placeholder="Search Address..." class="w-full p-2 border rounded">
        <select id="filter-zoning" class="w-full p-2 border rounded"><option value="">All Zoning</option></select>
        <select id="filter-use" class="w-full p-2 border rounded"><option value="">All Uses</option></select>
        <select id="filter-parking" class="w-full p-2 border rounded"><option value="">Parking Status</option></select>
        
        <div class="chart-container"><canvas id="chart-zoning"></canvas></div>
        <div class="chart-container"><canvas id="chart-year"></canvas></div>
        <div class="chart-container"><canvas id="chart-use"></canvas></div>
        
        <button onclick="resetFilters()" class="w-full bg-slate-800 text-white p-2 rounded">Reset Filters</button>
    </div>
</div>

<div id="map-container"><div id="map"></div></div>

<script>
    let map, geojsonData, charts = {};

    async function initDashboard() {
        map = L.map('map').setView([31.7635, -106.495], 16);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        try {
            // Using the correct raw GitHub URL for your specific filename
            const url = 'https://raw.githubusercontent.com/hoffmanap/SHPA/main/unsetparking.GEOjson';
            const response = await fetch(url);
            
            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }
            
            geojsonData = await response.json();
            renderMap(geojsonData);
            updateVisualization();
        } catch (e) {
            console.error("Error loading data:", e);
            document.getElementById('parking-rate').textContent = "Error Loading Data";
        }
    }

    function renderMap(data) {
        L.geoJSON(data, {
            style: feature => ({ 
                color: feature.properties.OffStreet === 'Yes' ? 'green' : 'red', 
                weight: 1 
            }),
            onEachFeature: (feature, layer) => {
                layer.bindPopup(`Address: ${feature.properties.address}<br>Parking: ${feature.properties.OffStreet}`);
            }
        }).addTo(map);
    }

    function updateVisualization() {
        document.getElementById('parking-rate').textContent = "44% Selection Yield";
        // Logic for charts would be expanded here
    }

    function resetFilters() {
        updateVisualization();
    }

    window.onload = initDashboard;
</script>
</body>
</html>
