<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunset Heights Topographic & Parking Feasibility</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; background-color: #0f172a; font-family: sans-serif; }
        
        /* Compact Header */
        #header { padding: 10px 15px; color: white; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; height: 50px; }
        
        /* Layout Structure */
        #app-container { display: flex; flex-grow: 1; height: calc(100vh - 50px); overflow: hidden; }
        #sidebar { width: 310px; background: #f8fafc; padding: 15px; overflow-y: auto; border-right: 1px solid #e2e8f0; z-index: 1000; display: flex; flex-direction: column; gap: 12px; }
        #main-view { display: flex; flex-direction: column; flex-grow: 1; overflow: hidden; }
        #map { flex-grow: 1; min-height: 200px; }
        
        /* Compact Charts Panel */
        #charts-panel { height: 230px; background: #f8fafc; border-top: 1px solid #e2e8f0; display: flex; padding: 10px; gap: 10px; }
        .chart-box { flex: 1; background: white; border: 1px solid #e2e8f0; border-radius: 6px; padding: 8px; display: flex; flex-direction: column; align-items: center; }
        .chart-wrapper { position: relative; height: 100%; width: 100%; min-height: 0; }
        
        /* Utility */
        .filter-group { margin-bottom: 0.5rem; }
        .decade-btn { transition: all 0.2s; cursor: pointer; text-align: center; font-size: 0.65rem; font-weight: bold; padding: 4px; border-radius: 4px; }
        .decade-btn.active { background-color: #2563eb; color: white; border-color: #1d4ed8; }
        .decade-btn.inactive { background-color: #e2e8f0; color: #475569; border-color: #cbd5e1; }
    </style>
</head>
<body>

<div id="header">
    <div>
        <h1 class="text-base font-bold text-slate-100">Sunset Heights Feasibility Hub</h1>
        <p class="text-[10px] text-slate-400">Evaluating Grading Challenges & Lot Forms • El Paso, TX</p>
    </div>
    <div id="scope-badge" class="bg-indigo-900 text-indigo-100 text-xs py-1 px-3 rounded border border-indigo-700">Scope: Loading...</div>
</div>

<div id="app-container">
    <div id="sidebar">
        <div class="bg-[#1e1b4b] p-3 rounded shadow text-white border border-[#312e81]">
            <p class="text-[10px] font-bold tracking-wider text-indigo-300 mb-1 uppercase">Off-Street Capacity Rate</p>
            <div class="flex items-baseline gap-2 mb-1">
                <span id="parking-rate" class="text-3xl font-extrabold text-white">0%</span>
            </div>
            <div class="w-full bg-slate-700 h-1.5 rounded-full mb-1"><div id="yield-bar" class="bg-emerald-400 h-1.5 rounded-full" style="width: 0%"></div></div>
            <p id="yield-text" class="text-[10px] text-indigo-200">Isolating 0 lots out of 0</p>
        </div>
        
        <div class="flex justify-between items-center border-b border-gray-200 pb-1">
            <h2 class="text-xs font-bold uppercase tracking-wide">Variable Modifiers</h2>
            <button onclick="resetFilters()" class="text-[10px] text-blue-600 font-semibold hover:underline">Reset All</button>
        </div>

        <div class="filter-group">
            <label class="block text-[10px] font-semibold text-gray-600 mb-1">ERA OF CONSTRUCTION</label>
            <div id="decade-grid" class="grid grid-cols-4 gap-1">
                </div>
        </div>

        <div class="filter-group">
            <label class="block text-[10px] font-semibold text-gray-600 mb-1">ELEVATION DELTA (SLOPE)</label>
            <select id="filter-delta" class="w-full p-1 border border-gray-300 rounded text-xs" onchange="applyFilters()">
                <option value="">All Elevations</option>
                <option value="0-5">0 - 5 ft (Relatively Flat)</option>
                <option value="5-15">5 - 15 ft (Moderate Grade)</option>
                <option value="15-25">15 - 25 ft (Steep Grade)</option>
                <option value="25-999">25+ ft (Extreme Grade)</option>
            </select>
        </div>

        <div class="flex gap-2 filter-group">
            <div class="w-1/2">
                <label class="block text-[10px] font-semibold text-gray-600 mb-1">CURB CUT</label>
                <select id="filter-curbcut" class="w-full p-1 border border-gray-300 rounded text-xs" onchange="applyFilters()"><option value="">All</option></select>
            </div>
            <div class="w-1/2">
                <label class="block text-[10px] font-semibold text-gray-600 mb-1">ZONING</label>
                <select id="filter-zoning" class="w-full p-1 border border-gray-300 rounded text-xs" onchange="applyFilters()"><option value="">All</option></select>
            </div>
        </div>
    </div>

    <div id="main-view">
        <div id="map"></div>
        <div id="charts-panel">
            <div class="chart-box">
                <h3 class="text-[10px] font-bold text-gray-600 uppercase tracking-wider mb-1">Parcel Share by Elevation Delta</h3>
                <div class="chart-wrapper"><canvas id="chart-slope"></canvas></div>
            </div>
            <div class="chart-box">
                <h3 class="text-[10px] font-bold text-gray-600 uppercase tracking-wider mb-1">Historical Build Eras (% of Selection)</h3>
                <div class="chart-wrapper"><canvas id="chart-timeline"></canvas></div>
            </div>
            <div class="chart-box">
                <h3 class="text-[10px] font-bold text-gray-600 uppercase tracking-wider mb-1">Parking Typology Distribution</h3>
                <div class="chart-wrapper"><canvas id="chart-typologies"></canvas></div>
            </div>
        </div>
    </div>
</div>

<script>
    const PROPERTY_KEYS = {
        zoning: "zoning",         
        yearBuilt: "YR_BLT",   
        offStreet: "OffStreet",   
        address: "address",       
        typology: "Type",
        curbCut: "CurbCut",
        highElev: "highest_parcel_elevation", 
        lowElev: "lowest_parcel_elevation"    
    };

    let map, geojsonData, geojsonLayer;
    let charts = { slope: null, timeline: null, typologies: null };
    let activeDecades = new Set(); // If empty, all are selected

    async function initDashboard() {
        // Aesthetic Base Map
        const baseLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution: '© CartoDB' });
        
        // Detailed Topographic / Contour Map (Esri World Topo)
        const topoLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}', { 
            attribution: '© Esri', 
            opacity: 0.8 
        });

        map = L.map('map', { center: [31.7635, -106.495], zoom: 16, layers: [baseLayer] });
        L.control.layers({"Clean Map": baseLayer}, {"Topographic Contours": topoLayer}).addTo(map);

        // Add Map Legend
        const legend = L.control({ position: 'bottomright' });
        legend.onAdd = function () {
            const div = L.DomUtil.create('div', 'bg-white p-2 border border-gray-300 rounded shadow text-xs');
            div.innerHTML = `
                <div class="font-bold mb-1 border-b pb-1">Off-Street Parking</div>
                <div class="flex items-center"><span class="inline-block w-3 h-3 bg-[#10b981] opacity-70 border border-[#10b981] mr-2"></span> Present</div>
                <div class="flex items-center mt-1"><span class="inline-block w-3 h-3 bg-[#ef4444] opacity-70 border border-[#ef4444] mr-2"></span> None</div>
            `;
            return div;
        };
        legend.addTo(map);

        generateDecadeButtons();

        try {
            const response = await fetch('./sunsetparking.GEOjson'); 
            if (!response.ok) throw new Error("Could not fetch data.");
            geojsonData = await response.json();
            
            initCharts();
            populateFilters();
            applyFilters(); 
            
        } catch (e) {
            console.error("Dashboard init error:", e);
        }
    }

    function generateDecadeButtons() {
        const container = document.getElementById('decade-grid');
        for (let year = 1900; year <= 2020; year += 10) {
            let btn = document.createElement('div');
            btn.className = 'decade-btn inactive border';
            btn.textContent = year + 's';
            btn.onclick = () => toggleDecade(btn, year);
            container.appendChild(btn);
        }
    }

    function toggleDecade(btn, decade) {
        if (activeDecades.has(decade)) {
            activeDecades.delete(decade);
            btn.classList.remove('active');
            btn.classList.add('inactive');
        } else {
            activeDecades.add(decade);
            btn.classList.remove('inactive');
            btn.classList.add('active');
        }
        applyFilters();
    }

    function applyFilters() {
        if (!geojsonData) return;
        
        const zoningFilter = document.getElementById('filter-zoning').value;
        const curbcutFilter = document.getElementById('filter-curbcut').value;
        const deltaFilter = document.getElementById('filter-delta').value;

        const filteredFeatures = geojsonData.features.filter(f => {
            const p = f.properties;
            
            // 1. Zoning & Curbcut
            if (zoningFilter && p[PROPERTY_KEYS.zoning] !== zoningFilter) return false;
            if (curbcutFilter && p[PROPERTY_KEYS.curbCut] !== curbcutFilter) return false;

            // 2. Decade filter
            if (activeDecades.size > 0) {
                const year = parseInt(p[PROPERTY_KEYS.yearBuilt]);
                if (!year) return false;
                const decade = Math.floor(year / 10) * 10;
                if (!activeDecades.has(decade)) return false;
            }

            // 3. Elevation Delta filter
            if (deltaFilter) {
                const high = parseFloat(p[PROPERTY_KEYS.highElev]) || 0;
                const low = parseFloat(p[PROPERTY_KEYS.lowElev]) || 0;
                const diff = high - low;
                
                if (deltaFilter === "0-5" && diff > 5) return false;
                if (deltaFilter === "5-15" && (diff <= 5 || diff > 15)) return false;
                if (deltaFilter === "15-25" && (diff <= 15 || diff > 25)) return false;
                if (deltaFilter === "25-999" && diff <= 25) return false;
            }

            return true;
        });

        renderMapData(filteredFeatures);
        updateKPIs(filteredFeatures);
        updateChartsData(filteredFeatures);
    }

    function renderMapData(features) {
        if (geojsonLayer) { map.removeLayer(geojsonLayer); }
        
        geojsonLayer = L.geoJSON(features, {
            style: f => {
                const hasParking = f.properties[PROPERTY_KEYS.offStreet] === 'Yes' || f.properties[PROPERTY_KEYS.offStreet] === 'Y';
                return { color: hasParking ? '#10b981' : '#ef4444', weight: 1, fillOpacity: 0.6 };
            },
            onEachFeature: (f, l) => {
                const high = parseFloat(f.properties[PROPERTY_KEYS.highElev]) || 0;
                const low = parseFloat(f.properties[PROPERTY_KEYS.lowElev]) || 0;
                const elevationDiff = (high - low).toFixed(1);

                l.bindPopup(`
                    <div class="text-xs">
                        <strong class="text-sm">${f.properties[PROPERTY_KEYS.address] || 'No Address'}</strong><br>
                        <hr class="my-1">
                        <b>Elevation Delta:</b> ${elevationDiff} ft<br>
                        <b>Year Built:</b> ${f.properties[PROPERTY_KEYS.yearBuilt] || 'N/A'}<br>
                        <b>Parking Type:</b> ${f.properties[PROPERTY_KEYS.typology] || 'None'}
                    </div>
                `);
            }
        }).addTo(map);
    }

    function populateFilters() {
        const zoningSelect = document.getElementById('filter-zoning');
        const curbcutSelect = document.getElementById('filter-curbcut');
        
        const zones = [...new Set(geojsonData.features.map(f => f.properties[PROPERTY_KEYS.zoning]))].filter(Boolean).sort();
        const curbcuts = [...new Set(geojsonData.features.map(f => f.properties[PROPERTY_KEYS.curbCut]))].filter(Boolean).sort();
        
        zones.forEach(z => zoningSelect.add(new Option(z, z)));
        curbcuts.forEach(c => curbcutSelect.add(new Option(c, c)));
    }

    function updateKPIs(features) {
        const total = features.length;
        const withParking = features.filter(f => f.properties[PROPERTY_KEYS.offStreet] === 'Yes' || f.properties[PROPERTY_KEYS.offStreet] === 'Y').length;
        const rate = total === 0 ? 0 : Math.round((withParking / total) * 100);
        
        document.getElementById('parking-rate').textContent = `${rate}%`;
        document.getElementById('yield-bar').style.width = `${rate}%`;
        document.getElementById('yield-text').textContent = `Isolating ${total} lots from dataset`;
        document.getElementById('scope-badge').textContent = `Scope: ${total} Parcels`;
    }

    // Custom Tooltip callback to show absolute numbers
    const percentageTooltip = {
        callbacks: {
            label: function(context) {
                let percentage = context.raw.toFixed(1);
                let absoluteCount = context.chart.countsArray[context.dataIndex];
                return ` ${percentage}% (${absoluteCount} parcels)`;
            }
        }
    };

    function initCharts() {
        Chart.defaults.font.size = 10;
        
        // Elevation Delta Chart - Horizontal Bar
        charts.slope = new Chart(document.getElementById('chart-slope').getContext('2d'), {
            type: 'bar',
            data: { labels: ['0-5 ft', '5-15 ft', '15-25 ft', '25+ ft'], datasets: [{ data: [], backgroundColor: '#6366f1' }] },
            options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, tooltip: percentageTooltip }, scales: { x: { max: 100, ticks: { callback: v => v + '%' } } } }
        });

        // Timeline Chart - Vertical Bar
        charts.timeline = new Chart(document.getElementById('chart-timeline').getContext('2d'), {
            type: 'bar',
            data: { labels: [], datasets: [{ data: [], backgroundColor: '#10b981' }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, tooltip: percentageTooltip }, scales: { y: { max: 100, ticks: { callback: v => v + '%' } } } }
        });

        // Typologies Chart - Horizontal Bar (Cleaner than Doughnut for %)
        charts.typologies = new Chart(document.getElementById('chart-typologies').getContext('2d'), {
            type: 'bar',
            data: { labels: [], datasets: [{ data: [], backgroundColor: '#f59e0b' }] },
            options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, tooltip: percentageTooltip }, scales: { x: { max: 100, ticks: { callback: v => v + '%' } } } }
        });
    }

    function updateChartsData(features) {
        const total = features.length || 1; // Prevent division by zero

        // 1. Elevation Delta Aggregation
        let slopeCounts = [0, 0, 0, 0];
        features.forEach(f => {
            const high = parseFloat(f.properties[PROPERTY_KEYS.highElev]) || 0;
            const low = parseFloat(f.properties[PROPERTY_KEYS.lowElev]) || 0;
            const diff = high - low;
            if (diff <= 5) slopeCounts[0]++;
            else if (diff <= 15) slopeCounts[1]++;
            else if (diff <= 25) slopeCounts[2]++;
            else slopeCounts[3]++;
        });
        charts.slope.countsArray = slopeCounts;
        charts.slope.data.datasets[0].data = slopeCounts.map(c => (c / total) * 100);
        charts.slope.update();

        // 2. Timeline Aggregation
        let decades = {};
        features.forEach(f => {
            let year = parseInt(f.properties[PROPERTY_KEYS.yearBuilt]);
            if (year && year >= 1900) {
                let decade = Math.floor(year / 10) * 10;
                decades[decade] = (decades[decade] || 0) + 1;
            }
        });
        const sortedDecades = Object.keys(decades).sort();
        const timelineCounts = sortedDecades.map(d => decades[d]);
        
        charts.timeline.countsArray = timelineCounts;
        charts.timeline.data.labels = sortedDecades.map(d => d + 's');
        charts.timeline.data.datasets[0].data = timelineCounts.map(c => (c / total) * 100);
        charts.timeline.update();

        // 3. Typologies Aggregation
        let types = {};
        features.forEach(f => {
            let type = f.properties[PROPERTY_KEYS.typology];
            if (type && type.trim() !== "") {
                types[type] = (types[type] || 0) + 1;
            }
        });
        // Sort typologies by frequency
        const sortedTypes = Object.keys(types).sort((a, b) => types[b] - types[a]);
        const typeCounts = sortedTypes.map(t => types[t]);

        charts.typologies.countsArray = typeCounts;
        charts.typologies.data.labels = sortedTypes;
        charts.typologies.data.datasets[0].data = typeCounts.map(c => (c / total) * 100);
        charts.typologies.update();
    }

    function resetFilters() {
        document.getElementById('filter-zoning').value = '';
        document.getElementById('filter-curbcut').value = '';
        document.getElementById('filter-delta').value = '';
        
        activeDecades.clear();
        document.querySelectorAll('.decade-btn').forEach(btn => {
            btn.classList.remove('active');
            btn.classList.add('inactive');
        });
        
        applyFilters();
    }

    window.onload = initDashboard;
</script>
</body>
</html>
