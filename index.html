<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunset Heights Parking Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #map { height: 100vh; width: 100%; }
        .legend { background: white; padding: 10px; border-radius: 5px; box-shadow: 0 0 15px rgba(0,0,0,0.2); }
    </style>
</head>
<body class="bg-gray-100">

    <div id="map"></div>

    <script>
        // Initialize Map centered on Sunset Heights
        const map = L.map('map').setView([31.7635, -106.4900], 16);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // Fetch data from root directory
        fetch('./sunsetparking.geojson')
            .then(response => {
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                return response.json();
            })
            .then(data => {
                L.geoJSON(data, {
                    style: function(feature) {
                        return {
                            fillColor: feature.properties.OffStreet === 'Y' ? '#10B981' : '#EF4444',
                            weight: 1,
                            opacity: 1,
                            color: 'white',
                            fillOpacity: 0.7
                        };
                    },
                    onEachFeature: function(feature, layer) {
                        layer.bindPopup(`Address: ${feature.properties.address || 'N/A'}<br>Parking: ${feature.properties.OffStreet}`);
                    }
                }).addTo(map);
            })
            .catch(err => {
                console.error("Dashboard failed to load:", err);
                alert("Error loading parking data. Ensure 'sunsetparking.geojson' is in the root folder.");
            });
    </script>
</body>
</html>
