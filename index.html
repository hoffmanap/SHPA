<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunset Heights Parking Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 350px; background: #f8fafc; padding: 20px; border-right: 1px solid #e2e8f0; z-index: 1000; box-shadow: 2px 0 5px rgba(0,0,0,0.1); }
        #map { flex-grow: 1; height: 100%; }
        .filter-group { margin-bottom: 1rem; }
    </style>
</head>
<body>

<div id="sidebar">
    <h1 class="text-xl font-bold mb-4">Sunset Heights Analysis</h1>
    <div class="bg-white p-4 rounded shadow mb-4">
        <p class="text-sm text-gray-500">Off-Street Capacity Rate</p>
        <div id="parking-rate" class="text-2xl font-bold text-blue-600">Loading...</div>
    </div>
    
    <div class="space-y-4">
        <div class="filter-group">
            <label class="block text-xs font-semibold text-gray-600 mb-1">ZONING CODE</label>
            <select id="filter-zoning" class="w-full p-2 border rounded"><option value="">All Zoning</option></select>
        </div>
        <div class="filter-group">
            <label class="block text-xs font-semibold text-gray-600 mb-1">PROPERTY USE</label>
            <select id="filter-use" class="w-full p-2 border rounded"><option value="">All Uses</option></select>
        </div>
    </div>
</div>

<div id="map"></div>

<script>
    let map, geojsonData;

    async function initDashboard() {
        // Base layers
        const baseLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '© CartoDB'
        });

        const topoLayer = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenTopoMap',
            opacity: 0.6
        });

        map = L.map('map', {
            center: [31.7635, -106.495],
            zoom: 16,
            layers: [baseLayer]
        });

        // Add Layer Control for Topography
        L.control.layers({"Map": baseLayer}, {"Topography": topoLayer}).addTo(map);

        try {
            const response = await fetch('https://raw.githubusercontent.com/hoffmanap/SHPA/main/unsetparking.GEOjson');
            geojsonData = await response.json();
            
            populateFilters();
            
            L.geoJSON(geojsonData, {
                style: f => ({ 
                    color: f.properties.OffStreet === 'Yes' ? '#10b981' : '#ef4444', 
                    weight: 2,
                    fillOpacity: 0.5 
                }),
                onEachFeature: (f, l) => l.bindPopup(`Address: ${f.properties.address}<br>Parking: ${f.properties.OffStreet}`)
            }).addTo(map);
            
            document.getElementById('parking-rate').textContent = "44% Selection Yield";
        } catch (e) {
            console.error("Error loading GeoJSON:", e);
            document.getElementById('parking-rate').textContent = "Data Error";
        }
    }

    function populateFilters() {
        const zoningSelect = document.getElementById('filter-zoning');
        const useSelect = document.getElementById('filter-use');
        
        const zones = [...new Set(geojsonData.features.map(f => f.properties.zoning))].sort();
        const uses = [...new Set(geojsonData.features.map(f => f.properties.use))].sort();
        
        zones.forEach(z => {
            if(z) {
                const opt = document.createElement('option');
                opt.value = z; opt.textContent = z;
                zoningSelect.appendChild(opt);
            }
        });
        
        uses.forEach(u => {
            if(u) {
                const opt = document.createElement('option');
                opt.value = u; opt.textContent = u;
                useSelect.appendChild(opt);
            }
        });
    }

    window.onload = initDashboard;
</script>
</body>
</html>
