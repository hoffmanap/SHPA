<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunset Heights Topographic & Parking Feasibility</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; background-color: #0f172a; font-family: 'Tw Cen MT', 'Century Gothic', sans-serif; }
        
        #header { padding: 8px 15px; color: white; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; height: 50px; }
        
        #app-container { display: flex; flex-grow: 1; height: calc(100vh - 50px); overflow: hidden; }
        #sidebar { width: 320px; background: #f8fafc; padding: 12px; overflow-y: auto; border-right: 1px solid #e2e8f0; z-index: 1000; display: flex; flex-direction: column; gap: 10px; }
        #main-view { display: flex; flex-direction: column; flex-grow: 1; overflow: hidden; height: 100%; }
        #map { flex-grow: 1; height: 100%; min-height: 200px; z-index: 1; position: relative;}
        
        #charts-panel { height: 230px; background: #f8fafc; border-top: 1px solid #e2e8f0; display: flex; padding: 10px; gap: 10px; }
        .chart-box { flex: 1; background: white; border: 1px solid #e2e8f0; border-radius: 6px; padding: 8px; display: flex; flex-direction: column; align-items: center; }
        .chart-wrapper { position: relative; height: 100%; width: 100%; min-height: 0; }
        
        .filter-group { margin-bottom: 0.2rem; }
        .decade-btn { transition: all 0.2s; cursor: pointer; text-align: center; font-size: 0.7rem; font-weight: bold; padding: 4px; border-radius: 4px; }
        .decade-btn.active { background-color: #2563eb; color: white; border-color: #1d4ed8; }
        .decade-btn.inactive { background-color: #e2e8f0; color: #475569; border-color: #cbd5e1; }
        
        h1, h2, h3, .font-bold { font-weight: 700; }
    </style>
</head>
<body>

<div id="header">
    <div>
        <h1 class="text-lg font-bold text-slate-100 uppercase tracking-wide">Sunset Heights Feasibility Hub</h1>
        <p class="text-[11px] text-slate-400">Evaluating Grading Challenges & Lot Forms • El Paso, TX</p>
    </div>
    <div id="scope-badge" class="bg-indigo-900 text-indigo-100 text-xs font-bold py-1 px-3 rounded border border-indigo-700">Scope: Initializing...</div>
</div>

<div id="app-container">
    <div id="sidebar">
        <div class="bg-[#1e1b4b] p-3 rounded shadow text-white border border-[#312e81]">
            <p class="text-[11px] font-bold tracking-wider text-indigo-300 mb-1 uppercase">Percentage of Lots with Off-Street Parking</p>
            <div class="flex items-baseline gap-2 mb-1">
                <span id="parking-rate" class="text-4xl font-bold text-white">0%</span>
            </div>
            <div class="w-full bg-slate-700 h-1.5 rounded-full mb-1"><div id="yield-bar" class="bg-emerald-400 h-1.5 rounded-full" style="width: 0%"></div></div>
            <p id="yield-text" class="text-[11px] text-indigo-200">Isolating 0 lots out of 0</p>
        </div>

        <div class="filter-group bg-slate-200 p-2 rounded border border-slate-300 mt-1">
            <label class="block text-[11px] font-bold text-gray-800 mb-1 uppercase">Map Display Mode</label>
            <select id="map-color-mode" class="w-full p-1 border border-gray-300 rounded text-xs font-bold" onchange="applyFilters()">
                <option value="parking">Color by Off-Street Parking Status</option>
                <option value="elevation">Color by Parcel Elevation Delta</option>
            </select>
        </div>
        
        <div class="flex justify-between items-center border-b border-gray-300 pb-1 mt-1">
            <h2 class="text-[11px] font-bold uppercase tracking-wide text-gray-800">Variable Modifiers</h2>
            <button onclick="resetFilters()" class="text-[11px] text-blue-600 font-bold hover:underline">Reset All Filters</button>
        </div>

        <div class="filter-group">
            <label class="block text-[11px] font-bold text-gray-600 mb-1 uppercase">Era of Construction</label>
            <div id="decade-grid" class="grid grid-cols-4 gap-1"></div>
        </div>

        <div class="filter-group">
            <label class="block text-[11px] font-bold text-gray-600 mb-1 uppercase">Elevation Delta (Slope)</label>
            <select id="filter-delta" class="w-full p-1 border border-gray-300 rounded text-xs" onchange="applyFilters()">
                <option value="">All Elevations</option>
                <option value="0-3">0 - 3 ft (Flat / Minimal)</option>
                <option value="3-6">3 - 6 ft (Moderate Grade)</option>
                <option value="6-10">6 - 10 ft (Steep Grade)</option>
                <option value="10-999">10+ ft (Extreme Grade)</option>
            </select>
        </div>

        <div class="filter-group mt-1">
            <label class="block text-[11px] font-bold text-gray-600 mb-1 uppercase">Use Description</label>
            <select id="filter-use" class="w-full p-1 border border-gray-300 rounded text-xs" onchange="applyFilters()"><option value="">All Uses</option></select>
        </div>

        <div class="flex gap-2 filter-group">
            <div class="w-1/2">
                <label class="block text-[11px] font-bold text-gray-600 mb-1 uppercase">Curb Cut</label>
                <select id="filter-curbcut" class="w-full p-1 border border-gray-300 rounded text-xs" onchange="applyFilters()"><option value="">All</option></select>
            </div>
            <div class="w-1/2">
                <label class="block text-[11px] font-bold text-gray-600 mb-1 uppercase">Zoning</label>
                <select id="filter-zoning" class="w-full p-1 border border-gray-300 rounded text-xs" onchange="applyFilters()"><option value="">All</option></select>
            </div>
        </div>
    </div>

    <div id="main-view">
        <div id="map"></div>
        <div id="charts-panel">
            <div class="chart-box">
                <h3 class="text-[11px] font-bold text-gray-800 uppercase tracking-wider mb-1">Parcel Share by Elevation Delta</h3>
                <div class="chart-wrapper"><canvas id="chart-slope"></canvas></div>
            </div>
            <div class="chart-box">
                <h3 class="text-[11px] font-bold text-gray-800 uppercase tracking-wider mb-1">Historical Build Eras</h3>
                <div class="chart-wrapper"><canvas id="chart-timeline"></canvas></div>
            </div>
            <div class="chart-box">
                <h3 class="text-[11px] font-bold text-gray-800 uppercase tracking-wider mb-1">Parking Typology Distribution</h3>
                <div class="chart-wrapper"><canvas id="chart-typologies"></canvas></div>
            </div>
        </div>
    </div>
</div>

<script>
    const PROPERTY_KEYS = {
        zoning: "zoning",         
        yearBuilt: "YR_BLT",   
        offStreet: "OffStreet",   
        address: "address",       
        typology: "Type",
        curbCut: "CurbCut",
        useDesc: "lbcs_structure_desc",
        highElev: "highest_parcel_elevation", 
        lowElev: "lowest_parcel_elevation"    
    };

    let map, geojsonData, geojsonLayer;
    let charts = { slope: null, timeline: null, typologies: null };
    let activeDecades = new Set();
    let chartFilterTypology = null; 
    let legendControl = null;

    document.addEventListener('DOMContentLoaded', async () => {
        try {
            const baseLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution: '© CartoDB' });
            map = L.map('map', { center: [31.7635, -106.495], zoom: 16, layers: [baseLayer] });
            
            setTimeout(() => { map.invalidateSize(); }, 250);

            generateDecadeButtons();
            updateLegend();

            document.getElementById('scope-badge').textContent = "Fetching Data...";
            
            // Appended cache-buster to ensure the newest file is pulled
            const response = await fetch('./sunsetparking.GEOjson?v=' + new Date().getTime()); 
            
            if (!response.ok) throw new Error(`HTTP Error: ${response.status} - Could not find sunsetparking.GEOjson. Check the file name and path.`);
            
            geojsonData = await response.json();
            
            initCharts();
            populateFilters();
            applyFilters(); 
            
        } catch (e) {
            console.error("Dashboard Initialization Error:", e);
            document.getElementById('scope-badge').textContent = "ERROR";
            document.getElementById('scope-badge').classList.replace('bg-indigo-900', 'bg-red-600');
            
            const mapContainer = document.getElementById('map');
            mapContainer.innerHTML = `
                <div style="background-color: #7f1d1d; color: white; padding: 2rem; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;">
                    <h2 style="font-size: 1.5rem; font-weight: bold; margin-bottom: 1rem;">Dashboard Failed to Load</h2>
                    <p style="font-size: 1rem; margin-bottom: 0.5rem;">${e.message}</p>
                    <p style="font-size: 0.8rem; opacity: 0.8;">Please verify your GitHub files or check the browser's Developer Console (F12) for detailed logs.</p>
                </div>
            `;
        }
    });

    function generateDecadeButtons() {
        const container = document.getElementById('decade-grid');
        for (let year = 1900; year <= 2020; year += 10) {
            let btn = document.createElement('div');
            btn.className = 'decade-btn inactive border';
            btn.textContent = year + 's';
            btn.dataset.year = year;
            btn.onclick = () => { toggleDecade(btn, year); applyFilters(); };
            container.appendChild(btn);
        }
    }

    function toggleDecade(btn, decade) {
        if (activeDecades.has(decade)) {
            activeDecades.delete(decade);
            btn.classList.remove('active');
            btn.classList.add('inactive');
        } else {
            activeDecades.add(decade);
            btn.classList.remove('inactive');
            btn.classList.add('active');
        }
    }

    function getElevationColor(d) {
        return d >= 10 ? '#991b1b' : 
               d >= 6  ? '#ef4444' : 
               d >= 3  ? '#fb923c' : 
                         '#fde047';  
    }

    function updateLegend() {
        if (legendControl) map.removeControl(legendControl);
        const modeSelect = document.getElementById('map-color-mode');
        const mode = modeSelect ? modeSelect.value : 'parking';
        
        legendControl = L.control({ position: 'bottomright' });
        legendControl.onAdd = function () {
            const div = L.DomUtil.create('div', 'bg-white p-2 border border-gray-300 rounded shadow text-xs font-bold');
            if (mode === 'parking') {
                div.innerHTML = `
                    <div class="mb-1 border-b pb-1">Off-Street Parking</div>
                    <div class="flex items-center"><span class="inline-block w-3 h-3 bg-[#10b981] opacity-80 border border-gray-400 mr-2"></span> Present</div>
                    <div class="flex items-center mt-1"><span class="inline-block w-3 h-3 bg-[#ef4444] opacity-80 border border-gray-400 mr-2"></span> None</div>
                `;
            } else {
                div.innerHTML = `
                    <div class="mb-1 border-b pb-1">Elevation Delta (Slope)</div>
                    <div class="flex items-center"><span class="inline-block w-3 h-3 bg-[#fde047] opacity-80 border border-gray-400 mr-2"></span> 0 - 3 ft</div>
                    <div class="flex items-center mt-1"><span class="inline-block w-3 h-3 bg-[#fb923c] opacity-80 border border-gray-400 mr-2"></span> 3 - 6 ft</div>
                    <div class="flex items-center mt-1"><span class="inline-block w-3 h-3 bg-[#ef4444] opacity-80 border border-gray-400 mr-2"></span> 6 - 10 ft</div>
                    <div class="flex items-center mt-1"><span class="inline-block w-3 h-3 bg-[#991b1b] opacity-80 border border-gray-400 mr-2"></span> 10+ ft</div>
                `;
            }
            return div;
        };
        legendControl.addTo(map);
    }

    function applyFilters() {
        if (!geojsonData) return;
        
        const zoningFilter = document.getElementById('filter-zoning').value;
        const curbcutFilter = document.getElementById('filter-curbcut').value;
        const deltaFilter = document.getElementById('filter-delta').value;
        const useFilter = document.getElementById('filter-use').value;

        const filteredFeatures = geojsonData.features.filter(f => {
            const p = f.properties;
            
            if (zoningFilter && p[PROPERTY_KEYS.zoning] !== zoningFilter) return false;
            if (curbcutFilter && p[PROPERTY_KEYS.curbCut] !== curbcutFilter) return false;
            if (useFilter && p[PROPERTY_KEYS.useDesc] !== useFilter) return false;
            if (chartFilterTypology && p[PROPERTY_KEYS.typology] !== chartFilterTypology) return false;

            if (activeDecades.size > 0) {
                const year = parseInt(p[PROPERTY_KEYS.yearBuilt]);
                if (!year) return false;
                const decade = Math.floor(year / 10) * 10;
                if (!activeDecades.has(decade)) return false;
            }

            if (deltaFilter) {
                const high = parseFloat(p[PROPERTY_KEYS.highElev]) || 0;
                const low = parseFloat(p[PROPERTY_KEYS.lowElev]) || 0;
                const diff = high - low;
                
                if (deltaFilter === "0-3" && diff > 3) return false;
                if (deltaFilter === "3-6" && (diff <= 3 || diff > 6)) return false;
                if (deltaFilter === "6-10" && (diff <= 6 || diff > 10)) return false;
                if (deltaFilter === "10-999" && diff <= 10) return false;
            }

            return true;
        });

        updateLegend(); 
        renderMapData(filteredFeatures);
        updateKPIs(filteredFeatures);
        updateChartsData(filteredFeatures);
    }

    function renderMapData(features) {
        if (geojsonLayer) { map.removeLayer(geojsonLayer); }
        const mode = document.getElementById('map-color-mode').value;
        
        geojsonLayer = L.geoJSON(features, {
            style: f => {
                let currentFillColor = '#cccccc'; 
                
                if (mode === 'parking') {
                    const offVal = f.properties[PROPERTY_KEYS.offStreet] ? f.properties[PROPERTY_KEYS.offStreet].toString().trim().toLowerCase() : '';
                    const hasParking = offVal === 'yes' || offVal === 'y' || offVal === 'true';
                    currentFillColor = hasParking ? '#10b981' : '#ef4444';
                } else {
                    const high = parseFloat(f.properties[PROPERTY_KEYS.highElev]) || 0;
                    const low = parseFloat(f.properties[PROPERTY_KEYS.lowElev]) || 0;
                    currentFillColor = getElevationColor(high - low);
                }

                return { fillColor: currentFillColor, color: '#334155', weight: 1, fillOpacity: 0.75 };
            },
            onEachFeature: (f, l) => {
                const high = parseFloat(f.properties[PROPERTY_KEYS.highElev]) || 0;
                const low = parseFloat(f.properties[PROPERTY_KEYS.lowElev]) || 0;
                const elevationDiff = (high - low).toFixed(1);

                l.bindPopup(`
                    <div class="text-xs font-sans">
                        <strong class="text-sm">${f.properties[PROPERTY_KEYS.address] || 'No Address'}</strong><br>
                        <hr class="my-1">
                        <b>Elevation Delta:</b> ${elevationDiff} ft<br>
                        <b>Year Built:</b> ${f.properties[PROPERTY_KEYS.yearBuilt] || 'N/A'}<br>
                        <b>Use:</b> ${f.properties[PROPERTY_KEYS.useDesc] || 'N/A'}<br>
                        <b>Parking Type:</b> ${f.properties[PROPERTY_KEYS.typology] || 'None'}
                    </div>
                `);
            }
        }).addTo(map);
    }

    function populateFilters() {
        const zoningSelect = document.getElementById('filter-zoning');
        const curbcutSelect = document.getElementById('filter-curbcut');
        const useSelect = document.getElementById('filter-use');
        
        const zones = [...new Set(geojsonData.features.map(f => f.properties[PROPERTY_KEYS.zoning]))].filter(Boolean).sort();
        const curbcuts = [...new Set(geojsonData.features.map(f => f.properties[PROPERTY_KEYS.curbCut]))].filter(Boolean).sort();
        const uses = [...new Set(geojsonData.features.map(f => f.properties[PROPERTY_KEYS.useDesc]))].filter(Boolean).sort();
        
        zones.forEach(z => zoningSelect.add(new Option(z, z)));
        curbcuts.forEach(c => curbcutSelect.add(new Option(c, c)));
        uses.forEach(u => useSelect.add(new Option(u, u)));
    }

    function updateKPIs(features) {
        const total = features.length;
        const withParking = features.filter(f => {
            const val = f.properties[PROPERTY_KEYS.offStreet] ? f.properties[PROPERTY_KEYS.offStreet].toString().trim().toLowerCase() : '';
            return val === 'yes' || val === 'y' || val === 'true';
        }).length;
        const rate = total === 0 ? 0 : Math.round((withParking / total) * 100);
        
        document.getElementById('parking-rate').textContent = `${rate}%`;
        document.getElementById('yield-bar').style.width = `${rate}%`;
        document.getElementById('yield-text').textContent = `Isolating ${total} lots from dataset`;
        document.getElementById('scope-badge').textContent = `Scope: ${total} Parcels`;
    }

    // Updated tooltips to handle multi-dataset charts (Timeline)
    const percentageTooltip = {
        callbacks: {
            label: function(context) {
                let percentage = context.raw.toFixed(1);
                let absoluteCount = context.dataset.countsArray[context.dataIndex];
                let labelStr = context.dataset.label ? context.dataset.label + ': ' : '';
                return ` ${labelStr}${percentage}% (${absoluteCount} parcels)`;
            }
        }
    };

    function initCharts() {
        Chart.defaults.font.family = "'Tw Cen MT', 'Century Gothic', sans-serif";
        Chart.defaults.font.size = 11;
        
        // Slope Chart
        charts.slope = new Chart(document.getElementById('chart-slope').getContext('2d'), {
            type: 'bar',
            data: { labels: ['0-3 ft', '3-6 ft', '6-10 ft', '10+ ft'], datasets: [{ data: [], backgroundColor: '#6366f1', hoverBackgroundColor: '#4f46e5' }] },
            options: { 
                indexAxis: 'y', responsive: true, maintainAspectRatio: false, 
                plugins: { legend: { display: false }, tooltip: percentageTooltip }, 
                scales: { 
                    x: { max: 100, title: { display: true, text: '% of Filtered Parcels', font: {weight: 'bold'} }, ticks: { callback: v => v + '%' } }
                },
                onClick: (e, activeEls) => {
                    if(activeEls.length > 0) {
                        const mappings = ["0-3", "3-6", "6-10", "10-999"];
                        document.getElementById('filter-delta').value = mappings[activeEls[0].index];
                        applyFilters();
                    }
                }
            }
        });

        // Timeline Chart (Now Stacked with Split Data)
        charts.timeline = new Chart(document.getElementById('chart-timeline').getContext('2d'), {
            type: 'bar',
            data: { 
                labels: [], 
                datasets: [
                    { label: 'With Parking', data: [], backgroundColor: '#10b981', hoverBackgroundColor: '#059669' },
                    { label: 'No Parking', data: [], backgroundColor: '#ef4444', hoverBackgroundColor: '#dc2626' }
                ] 
            },
            options: { 
                responsive: true, maintainAspectRatio: false, 
                plugins: { legend: { display: true, position: 'top', labels: { boxWidth: 8, font: {size: 9} } }, tooltip: percentageTooltip }, 
                scales: { 
                    x: { stacked: true },
                    y: { stacked: true, max: 100, title: { display: true, text: '% of Filtered Parcels', font: {weight: 'bold'} }, ticks: { callback: v => v + '%' } }
                },
                onClick: (e, activeEls) => {
                    if(activeEls.length > 0) {
                        const decadeLabel = charts.timeline.data.labels[activeEls[0].index];
                        const decade = parseInt(decadeLabel);
                        const btn = Array.from(document.querySelectorAll('.decade-btn')).find(b => parseInt(b.dataset.year) === decade);
                        if(btn) { toggleDecade(btn, decade); applyFilters(); }
                    }
                }
            }
        });

        // Typologies Chart
        charts.typologies = new Chart(document.getElementById('chart-typologies').getContext('2d'), {
            type: 'bar',
            data: { labels: [], datasets: [{ data: [], backgroundColor: '#f59e0b', hoverBackgroundColor: '#d97706' }] },
            options: { 
                indexAxis: 'y', responsive: true, maintainAspectRatio: false, 
                plugins: { legend: { display: false }, tooltip: percentageTooltip }, 
                scales: { 
                    x: { max: 100, title: { display: true, text: '% of Filtered Parcels', font: {weight: 'bold'} }, ticks: { callback: v => v + '%' } }
                },
                onClick: (e, activeEls) => {
                    if(activeEls.length > 0) {
                        const clickedType = charts.typologies.data.labels[activeEls[0].index];
                        chartFilterTypology = (chartFilterTypology === clickedType) ? null : clickedType; 
                        applyFilters();
                    }
                }
            }
        });
    }

    function updateChartsData(features) {
        const total = features.length || 1; 

        // 1. Elevation Aggregation
        let slopeCounts = [0, 0, 0, 0];
        features.forEach(f => {
            const high = parseFloat(f.properties[PROPERTY_KEYS.highElev]) || 0;
            const low = parseFloat(f.properties[PROPERTY_KEYS.lowElev]) || 0;
            const diff = high - low;
            if (diff <= 3) slopeCounts[0]++;
            else if (diff <= 6) slopeCounts[1]++;
            else if (diff <= 10) slopeCounts[2]++;
            else slopeCounts[3]++;
        });
        charts.slope.data.datasets[0].countsArray = slopeCounts;
        charts.slope.data.datasets[0].data = slopeCounts.map(c => (c / total) * 100);
        charts.slope.update();

        // 2. Timeline Aggregation (Split by Parking)
        let decades = {};
        features.forEach(f => {
            let year = parseInt(f.properties[PROPERTY_KEYS.yearBuilt]);
            if (year && year >= 1900) {
                let decade = Math.floor(year / 10) * 10;
                if (!decades[decade]) decades[decade] = { with: 0, without: 0 };
                
                const offVal = f.properties[PROPERTY_KEYS.offStreet] ? f.properties[PROPERTY_KEYS.offStreet].toString().trim().toLowerCase() : '';
                if (offVal === 'yes' || offVal === 'y' || offVal === 'true') {
                    decades[decade].with++;
                } else {
                    decades[decade].without++;
                }
            }
        });
        const sortedDecades = Object.keys(decades).sort();
        const withCounts = sortedDecades.map(d => decades[d].with);
        const withoutCounts = sortedDecades.map(d => decades[d].without);
        
        charts.timeline.data.datasets[0].countsArray = withCounts;
        charts.timeline.data.datasets[1].countsArray = withoutCounts;
        
        charts.timeline.data.labels = sortedDecades.map(d => d + 's');
        charts.timeline.data.datasets[0].data = withCounts.map(c => (c / total) * 100);
        charts.timeline.data.datasets[1].data = withoutCounts.map(c => (c / total) * 100);
        charts.timeline.update();

        // 3. Typologies Aggregation
        let types = {};
        features.forEach(f => {
            let type = f.properties[PROPERTY_KEYS.typology];
            if (type && type.trim() !== "") {
                types[type] = (types[type] || 0) + 1;
            }
        });
        
        const sortedTypes = Object.keys(types).sort((a, b) => types[b] - types[a]);
        const typeCounts = sortedTypes.map(t => types[t]);

        charts.typologies.data.datasets[0].countsArray = typeCounts;
        charts.typologies.data.labels = sortedTypes;
        charts.typologies.data.datasets[0].data = typeCounts.map(c => (c / total) * 100);
        charts.typologies.update();
    }

    function resetFilters() {
        document.getElementById('filter-zoning').value = '';
        document.getElementById('filter-curbcut').value = '';
        document.getElementById('filter-delta').value = '';
        document.getElementById('filter-use').value = '';
        document.getElementById('map-color-mode').value = 'parking';
        
        chartFilterTypology = null;
        activeDecades.clear();
        
        document.querySelectorAll('.decade-btn').forEach(btn => {
            btn.classList.remove('active');
            btn.classList.add('inactive');
        });
        
        applyFilters();
    }

</script>
</body>
</html>
