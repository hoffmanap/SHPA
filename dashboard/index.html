<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunset Heights Parking & Feasibility Dashboard</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body { margin: 0; padding: 0; background-color: #f3f4f6; }
        #map { height: 100%; width: 100%; border-radius: 0.5rem; }
        .chart-container { position: relative; height: 250px; width: 100%; }
    </style>
</head>
<body class="flex flex-col h-screen">

    <header class="bg-blue-900 text-white p-4 shadow-md z-10">
        <h1 class="text-2xl font-bold">Sunset Heights Parking Prevalence Dashboard</h1>
        <p class="text-sm text-blue-200">Interactive spatial analysis of off-street parking capacity and policy levers.</p>
    </header>

    <div class="flex flex-1 overflow-hidden">
        
        <aside class="w-80 bg-white p-4 shadow-lg overflow-y-auto flex flex-col gap-4 z-10">
            <h2 class="text-lg font-bold border-b pb-2">Data Filters</h2>
            
            <div>
                <label class="block text-sm font-semibold mb-1">Region (Auto-Calculated)</label>
                <select id="filter-region" class="w-full border rounded p-2 text-sm" onchange="updateDashboard()">
                    <option value="All">All Regions</option>
                    <option value="North">North</option>
