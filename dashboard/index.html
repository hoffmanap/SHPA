<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunset Heights Parking Dashboard</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
        }
        #sidebar {
            width: 400px;
            background: #f4f6f8;
            padding: 20px;
            overflow-y: auto;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
            z-index: 1000;
        }
        #map {
            flex-grow: 1;
            height: 100%;
        }
        .filter-group {
            margin-bottom: 15px;
        }
        select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 4px;
            border: 1px solid #ccc;
        }
        .chart-container {
            margin-top: 20px;
            width: 100%;
            height: 220px;
        }
        h2 { 
            font-size: 1.4em; 
            color: #2c3e50;
            border-bottom: 2px solid #3498db; 
            padding-bottom: 5px; 
        }
        h3 { 
            font-size: 1.1em; 
            color: #34495e;
            margin-top: 25px; 
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2>Sunset Heights Parking</h2>
        <p>Interactive dashboard visualizing off-street parking prevalence.</p>

        <div class="filter-group">
            <label for="zoningFilter"><strong>Zoning</strong></label>
            <select id="zoningFilter">
                <option value="all">All Zoning Types</option>
                </select>
        </div>
        
        <div class="filter-group">
            <label for="useFilter"><strong>Building Use (LBCS)</strong></label>
            <select id="useFilter">
                <option value="all">All Building Uses</option>
                </select>
        </div>

        <div class="filter-group">
            <label for="offStreetFilter"><strong>Off-Street Parking</strong></label>
            <select id="offStreetFilter">
                <option value="all">All Properties</option>
                <option value="Yes">Has Off-Street Parking</option>
                <option value="No">No Off-Street Parking</option>
            </select>
        </div>

        <h3>Parking by Zoning</h3>
        <div class="chart-container">
            <canvas id="zoningChart"></canvas>
        </div>

        <h3>Parking by Decade Built</h3>
        <div class="chart-container">
            <canvas id="decadeChart"></canvas>
        </div>
        
        <h3>Parking by Building Use</h3>
        <div class="chart-container">
            <canvas id="useChart"></canvas>
        </div>
    </div>

    <div id="map"></div>

    <script>
        // 1. Initialize Map centered on El Paso, TX (Sunset Heights approx)
        const map = L.map('map').setView([31.7619, -106.4850], 15);

        // Add Base Map Tile Layer
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/">CARTO</a>',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);

        let geojsonLayer;

        // 2. Data Fetching and Initialization (WITH NULL-VALUE SAFETY WRAPPER)
        fetch('sunsetparking.GEOjson')
            .then(response => {
                if (!response.ok) {
                    throw new Error("HTTP error " + response.status);
                }
                return response.json();
            })
            .then(data => {
                
                // Initialize the map layer
                geojsonLayer = L.geoJSON(data, {
                    style: function (feature) {
                        // SAFETY WRAPPER: Check if properties exist to prevent TypeError
                        if (!feature || !feature.properties) return {};

                        // Provide fallback values if data is null
                        const hasParking = feature.properties.OffStreet || "No";

                        // Color coding based on off-street parking
                        let fillColor = hasParking === "Yes" ? "#2ecc71" : "#e74c3c";

                        return {
                            fillColor: fillColor,
                            weight: 1,
                            opacity: 1,
                            color: 'white',
                            fillOpacity: 0.7
                        };
                    },
                    onEachFeature: function (feature, layer) {
                        if (feature.properties) {
                            // Fallbacks for popup text
                            const address = feature.properties.address || "Unknown Address";
                            const use = feature.properties.lbcs_structure_desc || "Unknown Use";
                            const zoning = feature.properties.zoning || "Unzoned";
                            const year = feature.properties.yearbuilt || "Unknown Year";
                            const parking = feature.properties.OffStreet || "No";
                            const units = feature.properties.ll_address_count || "N/A";
                            const type = feature.properties.Type || "None";
                            const curbCut = feature.properties.CurbCut || "No";
                            
                            layer.bindPopup(`
                                <div style="font-family: Arial, sans-serif;">
                                    <strong>${address}</strong><hr style="margin: 5px 0;">
                                    <b>Units:</b> ${units}<br>
                                    <b>Use:</b> ${use}<br>
                                    <b>Zoning:</b> ${zoning}<br>
                                    <b>Year Built:</b> ${year}<br>
                                    <b>Off-Street Parking:</b> ${parking}<br>
                                    <b>Parking Type:</b> ${type}<br>
                                    <b>Curb Cut:</b> ${curbCut}
                                </div>
                            `);
                        }
                    }
                }).addTo(map);

                // Fit map bounds to the loaded data
                map.fitBounds(geojsonLayer.getBounds());

                // (Optional for later) 
                // Call functions here to populate dropdowns and initialize Chart.js 
                // using the 'data.features' array.
                // initializeFilters(data.features);
                // initializeCharts(data.features);

            })
            .catch(error => {
                console.error("Dashboard Initialization Error:", error);
                alert("Failed to load map data. Please check the console and ensure you are running a local server.");
            });

            // Note: Chart.js initialization code would go below here, 
            // parsing the 'data.features' array to group and summarize your charts.
    </script>
</body>
</html>
