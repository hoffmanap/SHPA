<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunset Heights Parking Dashboard</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body { margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* Top Section: Sidebar + Map */
        #top-section { display: flex; flex: 1; overflow: hidden; }
        
        #sidebar { width: 350px; background: #2c3e50; color: #ecf0f1; padding: 20px; overflow-y: auto; box-shadow: 2px 0 5px rgba(0,0,0,0.2); z-index: 1000; }
        #sidebar h2 { margin-top: 0; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        #sidebar p { font-size: 0.9em; color: #bdc3c7; margin-bottom: 25px;}
        
        #map-container { flex: 1; position: relative; }
        #map { height: 100%; width: 100%; background: #f4f6f8; }

        /* Bottom Section: Charts */
        #bottom-section { height: 280px; display: flex; background: #ecf0f1; border-top: 3px solid #bdc3c7; padding: 15px; gap: 15px; }
        .chart-wrapper { flex: 1; background: white; border-radius: 8px; padding: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); position: relative; }
        .chart-wrapper h3 { margin: 0 0 10px 0; font-size: 1em; color: #34495e; text-align: center; }
        .canvas-container { position: relative; height: calc(100% - 30px); width: 100%; }

        /* Button Group Filters */
        .filter-category { margin-bottom: 25px; }
        .filter-category h3 { font-size: 1.05em; color: #ecf0f1; margin: 0 0 10px 0; border-bottom: 1px solid #7f8c8d; padding-bottom: 5px; }
        .button-group { display: flex; flex-wrap: wrap; gap: 8px; }
        .filter-btn { background: #34495e; color: #bdc3c7; border: 1px solid #7f8c8d; padding: 6px 12px; border-radius: 20px; cursor: pointer; font-size: 0.85em; transition: 0.2s; }
        .filter-btn:hover { background: #3498db; color: white; border-color: #3498db; }
        .filter-btn.active { background: #2ecc71; color: white; border-color: #27ae60; font-weight: bold; box-shadow: 0 0 8px rgba(46, 204, 113, 0.4); }

        /* Map Popups */
        .popup-content { font-family: Arial, sans-serif; max-height: 200px; overflow-y: auto; color: #333; }
    </style>
</head>
<body>

    <div id="top-section">
        <div id="sidebar">
            <h2>Sunset Heights</h2>
            <p>Interactive dashboard visualizing off-street parking prevalence. Use the buttons below to filter the map and charts simultaneously.</p>

            <div class="filter-category">
                <h3>Zoning</h3>
                <div id="btn-group-zoning" class="button-group"></div>
            </div>
            
            <div class="filter-category">
                <h3>Building Use</h3>
                <div id="btn-group-use" class="button-group"></div>
            </div>

            <div class="filter-category">
                <h3>Off-Street Parking</h3>
                <div id="btn-group-parking" class="button-group">
                    <button class="filter-btn active" onclick="updateFilter('offStreet', 'all', this)">All</button>
                    <button class="filter-btn" onclick="updateFilter('offStreet', 'Yes', this)">Yes</button>
                    <button class="filter-btn" onclick="updateFilter('offStreet', 'No', this)">No</button>
                </div>
            </div>
        </div>

        <div id="map-container">
            <div id="map"></div>
        </div>
    </div>

    <div id="bottom-section">
        <div class="chart-wrapper">
            <h3>Parking by Zoning (%)</h3>
            <div class="canvas-container"><canvas id="zoningChart"></canvas></div>
        </div>
        <div class="chart-wrapper">
            <h3>Parking by Decade Built (%)</h3>
            <div class="canvas-container"><canvas id="decadeChart"></canvas></div>
        </div>
        <div class="chart-wrapper">
            <h3>Parking by Building Use (%)</h3>
            <div class="canvas-container"><canvas id="useChart"></canvas></div>
        </div>
    </div>

    <script>
        const map = L.map('map').setView([31.7619, -106.4850], 15);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { maxZoom: 20 }).addTo(map);

        let geojsonLayer;
        let masterData = []; 
        let charts = {}; 
        
        // State object to track active buttons
        let currentFilters = { zoning: 'all', use: 'all', offStreet: 'all' };

        function getDecade(year) {
            if (!year) return "Unknown";
            const y = parseInt(year);
            if (isNaN(y)) return "Unknown";
            return Math.floor(y / 10) * 10 + "s";
        }

        // FETCH FIX: Enforcing strict lowercase .geojson 
        fetch('sunsetparking.geojson')
            .then(response => {
                if (!response.ok) throw new Error("File not found on server.");
                return response.json();
            })
            .then(data => {
                let rawFeatures = data.features ? data.features : (Array.isArray(data) ? data : []);
                masterData = rawFeatures.filter(f => f && f.properties);
                
                buildDynamicButtons(masterData);
                applyFilters(); // Renders map and charts based on initial 'all' state
            })
            .catch(error => {
                console.error("Fetch Error:", error);
                document.getElementById('map').innerHTML = `<div style="padding:20px; color:red;"><b>Error loading data:</b> Ensure your file on GitHub is named exactly <i>sunsetparking.geojson</i> (all lowercase).</div>`;
            });

        function buildDynamicButtons(features) {
            const zonings = new Set();
            const uses = new Set();

            features.forEach(f => {
                if (f.properties.zoning) zonings.add(f.properties.zoning);
                if (f.properties.lbcs_structure_desc) uses.add(f.properties.lbcs_structure_desc);
            });

            createButtonGroup('btn-group-zoning', 'zoning', [...zonings].sort());
            createButtonGroup('btn-group-use', 'use', [...uses].sort());
        }

        function createButtonGroup(containerId, filterKey, values) {
            const container = document.getElementById(containerId);
            container.innerHTML = ''; 

            const allBtn = document.createElement('button');
            allBtn.className = 'filter-btn active';
            allBtn.innerText = 'All';
            allBtn.onclick = function() { updateFilter(filterKey, 'all', this); };
            container.appendChild(allBtn);

            values.forEach(val => {
                const btn = document.createElement('button');
                btn.className = 'filter-btn';
                btn.innerText = val;
                btn.onclick = function() { updateFilter(filterKey, val, this); };
                container.appendChild(btn);
            });
        }

        function updateFilter(filterKey, value, clickedBtn) {
            currentFilters[filterKey] = value;
            
            // Manage active styling
            const container = clickedBtn.parentElement;
            const buttons = container.getElementsByClassName('filter-btn');
            for(let btn of buttons) { btn.classList.remove('active'); }
            clickedBtn.classList.add('active');

            applyFilters();
        }

        function applyFilters() {
            const filtered = masterData.filter(f => {
                const p = f.properties;
                return (currentFilters.zoning === "all" || p.zoning === currentFilters.zoning) &&
                       (currentFilters.use === "all" || p.lbcs_structure_desc === currentFilters.use) &&
                       (currentFilters.offStreet === "all" || p.OffStreet === currentFilters.offStreet);
            });

            renderMap(filtered);
            renderCharts(filtered);
        }

        function renderMap(features) {
            if (geojsonLayer) map.removeLayer(geojsonLayer);

            geojsonLayer = L.geoJSON(features, {
                style: function (feature) {
                    const hasParking = feature.properties.OffStreet || "No";
                    return {
                        fillColor: hasParking === "Yes" ? "#2ecc71" : "#e74c3c",
                        weight: 1, opacity: 1, color: 'white', fillOpacity: 0.7
                    };
                },
                onEachFeature: function (feature, layer) {
                    let popupContent = `<div class="popup-content"><strong>${feature.properties.address || 'Property Data'}</strong><hr style="margin: 5px 0;">`;
                    for (const [key, value] of Object.entries(feature.properties)) {
                        if (value !== null && value !== "") {
                            popupContent += `<b>${key}:</b> ${value}<br>`;
                        }
                    }
                    popupContent += `</div>`;
                    layer.bindPopup(popupContent);
                }
            }).addTo(map);

            if (features.length > 0) map.fitBounds(geojsonLayer.getBounds());
        }

        function renderCharts(features) {
            updateChart('zoningChart', features, f => f.properties.zoning || "Unzoned");
            updateChart('decadeChart', features, f => getDecade(f.properties.yearbuilt));
            updateChart('useChart', features, f => f.properties.lbcs_structure_desc || "Unknown");
        }

        function updateChart(canvasId, features, categoryFn) {
            const stats = {};
            features.forEach(f => {
                const category = categoryFn(f);
                const hasParking = f.properties.OffStreet === "Yes";
                if (!stats[category]) stats[category] = { total: 0, withParking: 0 };
                stats[category].total++;
                if (hasParking) stats[category].withParking++;
            });

            const labels = Object.keys(stats).sort();
            const percentages = labels.map(label => ((stats[label].withParking / stats[label].total) * 100).toFixed(1));

            const ctx = document.getElementById(canvasId).getContext('2d');
            if (charts[canvasId]) charts[canvasId].destroy(); 

            charts[canvasId] = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{ label: '% with Off-Street Parking', data: percentages, backgroundColor: '#3498db', borderRadius: 4 }]
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false, 
                    scales: { y: { beginAtZero: true, max: 100, title: { display: true, text: 'Percentage (%)' } } }, 
                    plugins: { legend: { display: false } } 
                }
            });
        }
    </script>
</body>
</html>
