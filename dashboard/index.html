<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunset Heights Parking Dashboard</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body { margin: 0; padding: 0; display: flex; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; height: 100vh; }
        #sidebar { width: 450px; background: #f4f6f8; padding: 20px; overflow-y: auto; box-shadow: 2px 0 5px rgba(0,0,0,0.1); z-index: 1000; }
        #map { flex-grow: 1; height: 100%; }
        .filter-group { margin-bottom: 15px; }
        select { width: 100%; padding: 8px; margin-top: 5px; border-radius: 4px; border: 1px solid #ccc; }
        .chart-container { position: relative; margin-top: 20px; width: 100%; height: 250px; }
        h2 { font-size: 1.4em; color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 5px; }
        h3 { font-size: 1.1em; color: #34495e; margin-top: 25px; }
        .popup-content { font-family: Arial, sans-serif; max-height: 250px; overflow-y: auto; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2>Sunset Heights Parking</h2>
        <p>Interactive dashboard visualizing off-street parking prevalence.</p>

        <div class="filter-group">
            <label for="zoningFilter"><strong>Zoning</strong></label>
            <select id="zoningFilter" onchange="applyFilters()">
                <option value="all">All Zoning Types</option>
            </select>
        </div>
        
        <div class="filter-group">
            <label for="useFilter"><strong>Building Use (LBCS)</strong></label>
            <select id="useFilter" onchange="applyFilters()">
                <option value="all">All Building Uses</option>
            </select>
        </div>

        <div class="filter-group">
            <label for="offStreetFilter"><strong>Off-Street Parking</strong></label>
            <select id="offStreetFilter" onchange="applyFilters()">
                <option value="all">All Properties</option>
                <option value="Yes">Has Off-Street Parking</option>
                <option value="No">No Off-Street Parking</option>
            </select>
        </div>

        <h3>Parking Prevalence by Zoning (%)</h3>
        <div class="chart-container"><canvas id="zoningChart"></canvas></div>

        <h3>Parking Prevalence by Decade Built (%)</h3>
        <div class="chart-container"><canvas id="decadeChart"></canvas></div>
        
        <h3>Parking Prevalence by Building Use (%)</h3>
        <div class="chart-container"><canvas id="useChart"></canvas></div>
    </div>

    <div id="map"></div>

    <script>
        const map = L.map('map').setView([31.7619, -106.4850], 15);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { maxZoom: 20 }).addTo(map);

        let geojsonLayer;
        let masterData = []; 
        let charts = {}; 

        function getDecade(year) {
            if (!year) return "Unknown";
            const y = parseInt(year);
            if (isNaN(y)) return "Unknown";
            return Math.floor(y / 10) * 10 + "s";
        }

        // Fetch Data safely
        fetch('sunsetparking.GEOjson')
            .then(response => {
                if (!response.ok) throw new Error("File not found");
                return response.json();
            })
            .then(data => {
                let rawFeatures = data.features ? data.features : (Array.isArray(data) ? data : []);
                masterData = rawFeatures.filter(f => f && f.properties);
                
                populateDropdowns(masterData);
                renderMap(masterData);
                renderCharts(masterData);
            })
            .catch(error => console.error("Error loading data. Ensure local server is running:", error));

        function populateDropdowns(features) {
            const zonings = new Set();
            const uses = new Set();

            features.forEach(f => {
                if (f.properties.zoning) zonings.add(f.properties.zoning);
                if (f.properties.lbcs_structure_desc) uses.add(f.properties.lbcs_structure_desc);
            });

            const zoningSelect = document.getElementById('zoningFilter');
            [...zonings].sort().forEach(z => zoningSelect.add(new Option(z, z)));

            const useSelect = document.getElementById('useFilter');
            [...uses].sort().forEach(u => useSelect.add(new Option(u, u)));
        }

        function renderMap(features) {
            if (geojsonLayer) map.removeLayer(geojsonLayer);

            geojsonLayer = L.geoJSON(features, {
                style: function (feature) {
                    const hasParking = feature.properties.OffStreet || "No";
                    return {
                        fillColor: hasParking === "Yes" ? "#2ecc71" : "#e74c3c",
                        weight: 1, opacity: 1, color: 'white', fillOpacity: 0.7
                    };
                },
                onEachFeature: function (feature, layer) {
                    // DYNAMIC POPUP: Reads every column in your data automatically
                    let popupContent = `<div class="popup-content"><strong>${feature.properties.address || 'Property Data'}</strong><hr style="margin: 5px 0;">`;
                    for (const [key, value] of Object.entries(feature.properties)) {
                        if (value !== null && value !== "") {
                            popupContent += `<b>${key}:</b> ${value}<br>`;
                        }
                    }
                    popupContent += `</div>`;
                    layer.bindPopup(popupContent);
                }
            }).addTo(map);

            if (features.length > 0) map.fitBounds(geojsonLayer.getBounds());
        }

        function renderCharts(features) {
            updateChart('zoningChart', features, f => f.properties.zoning || "Unzoned");
            updateChart('decadeChart', features, f => getDecade(f.properties.yearbuilt));
            updateChart('useChart', features, f => f.properties.lbcs_structure_desc || "Unknown Use");
        }

        function updateChart(canvasId, features, categoryFn) {
            const stats = {};
            features.forEach(f => {
                const category = categoryFn(f);
                const hasParking = f.properties.OffStreet === "Yes";
                if (!stats[category]) stats[category] = { total: 0, withParking: 0 };
                stats[category].total++;
                if (hasParking) stats[category].withParking++;
            });

            const labels = Object.keys(stats).sort();
            const percentages = labels.map(label => ((stats[label].withParking / stats[label].total) * 100).toFixed(1));

            const ctx = document.getElementById(canvasId).getContext('2d');
            if (charts[canvasId]) charts[canvasId].destroy(); 

            charts[canvasId] = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{ label: '% with Off-Street Parking', data: percentages, backgroundColor: '#3498db' }]
                },
                options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, max: 100 } }, plugins: { legend: { display: false } } }
            });
        }

        function applyFilters() {
            const zFilter = document.getElementById('zoningFilter').value;
            const uFilter = document.getElementById('useFilter').value;
            const oFilter = document.getElementById('offStreetFilter').value;

            const filtered = masterData.filter(f => {
                const p = f.properties;
                return (zFilter === "all" || p.zoning === zFilter) &&
                       (uFilter === "all" || p.lbcs_structure_desc === uFilter) &&
                       (oFilter === "all" || p.OffStreet === oFilter);
            });

            renderMap(filtered);
            renderCharts(filtered);
        }
    </script>
</body>
</html>
