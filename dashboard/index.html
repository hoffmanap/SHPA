<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sunset Heights Parking Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body class="bg-gray-100">
    <div id="map" class="h-screen w-full"></div>

    <script>
        // Initialize Map
        const map = L.map('map').setView([31.7635, -106.4900], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // Fetch Data
        fetch('sunsetparking.geojson')
            .then(response => response.json())
            .then(data => {
                // FIXED DATA LOOP
                data.features.forEach(function(feature) {
                    // Safety Check: Verify geometry exists before processing
                    if (!feature.geometry || !feature.geometry.coordinates || feature.geometry.coordinates.length === 0) {
                        console.warn("Skipping feature with invalid geometry:", feature);
                        return; // Skip this record
                    }

                    // Proceed with rendering valid features
                    L.geoJSON(feature).addTo(map);
                });
            })
            .catch(err => console.error("Error loading spatial data:", err));
    </script>
</body>
</html>
